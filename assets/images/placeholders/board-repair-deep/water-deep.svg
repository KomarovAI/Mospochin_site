ll="#0f172a" stroke="#06b6d4" stroke-width="3"/><text x="610" y="447.0" text-anchor="middle" font-size="19" font-family="Arial" font-weight="700" fill="#f8fafc">Диагностика</text><rect x="783" y="135" width="184" height="90" rx="18" fill="#0f172a" stroke="#06b6d4" stroke-width="3"/><text x="875" y="187.0" text-anchor="middle" font-size="19" font-family="Arial" font-weight="700" fill="#f8fafc">Проверка</text><rect x="70" y="650" width="1060" height="54" rx="14" fill="#0f172a" stroke="#475569"/><text x="600" y="685" text-anchor="middle" font-size="18" font-family="Arial" font-weight="700" fill="#cbd5e1">ТЕХНИЧЕСКАЯ СХЕМА — НЕ ФОТОГРАФИЯ КОНКРЕТНОГО РЕМОНТА</text></svg>