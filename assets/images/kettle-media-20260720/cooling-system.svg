<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="760" viewBox="0 0 1200 760" role="img" aria-labelledby="title desc">
<title id="title">Заводская система охлаждения</title><desc id="desc">Охлаждение возможно только на моделях, где производитель предусмотрел отдельный водяной контур.</desc>
<defs>
  <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1"><stop stop-color="#f8fafc"/><stop offset="1" stop-color="#eef2f7"/></linearGradient>
  <linearGradient id="steel" x1="0" y1="0" x2="1" y2="0"><stop stop-color="#cbd5e1"/><stop offset=".45" stop-color="#f8fafc"/><stop offset="1" stop-color="#94a3b8"/></linearGradient>
  <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="10" stdDeviation="12" flood-color="#0f172a" flood-opacity=".15"/></filter>
  <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth"><path d="M0,0 L0,6 L9,3 z" fill="#0284c7"/></marker>
</defs>
<rect width="1200" height="760" rx="36" fill="url(#bg)"/>
<rect x="40" y="38" width="1120" height="684" rx="28" fill="#fff" stroke="#dbe3ec"/>
<text x="80" y="100" font-family="Arial, sans-serif" font-size="34" font-weight="800" fill="#0f172a">Заводская система охлаждения</text>
<text x="80" y="137" font-family="Arial, sans-serif" font-size="18" fill="#475569">Охлаждение возможно только на моделях, где производитель предусмотрел отдельный водяной контур.</text>
<g filter="url(#shadow)">
<path d="M470,260 Q630.0,202 790,260 L764,532 Q630.0,595 496,532 Z" fill="url(#steel)" stroke="#64748b" stroke-width="4"/>
<path d="M498,282 Q630.0,240 762,282 L738,496 Q630.0,538 522,496 Z" fill="#e0f2fe" stroke="#7dd3fc" stroke-width="3"/>
<ellipse cx="630.0" cy="260" rx="160.0" ry="48" fill="#f8fafc" stroke="#64748b" stroke-width="4"/>
<ellipse cx="630.0" cy="268" rx="126.0" ry="32" fill="#c7d2fe" opacity=".75"/>
<rect x="506" y="542" width="34" height="86" rx="10" fill="#64748b"/><rect x="720" y="542" width="34" height="86" rx="10" fill="#64748b"/>
</g>
<path d="M285 330 H470" stroke="#0284c7" stroke-width="18" marker-end="url(#arrow)"/><path d="M790 470 H1010" stroke="#0ea5e9" stroke-width="18" marker-end="url(#arrow)"/><path d="M520 470 Q630 520 740 470" fill="none" stroke="#38bdf8" stroke-width="18"/>
<circle cx="320" cy="330" r="34" fill="#e0f2fe" stroke="#0284c7" stroke-width="6"/><text x="304" y="338" font-family="Arial" font-size="26" font-weight="800" fill="#0284c7">IN</text>
<circle cx="1045" cy="470" r="34" fill="#e0f2fe" stroke="#0284c7" stroke-width="6"/><text x="1025" y="478" font-family="Arial" font-size="22" font-weight="800" fill="#0284c7">OUT</text>
<g><rect x="80" y="225" width="210" height="38" rx="12" fill="#fff" stroke="#cbd5e1"/><circle cx="98" cy="244" r="6" fill="#ea580c"/><text x="114" y="250" font-family="Arial, sans-serif" font-size="16" font-weight="700" fill="#334155">Заводской контур</text></g><g><rect x="80" y="405" width="210" height="38" rx="12" fill="#fff" stroke="#cbd5e1"/><circle cx="98" cy="424" r="6" fill="#ea580c"/><text x="114" y="430" font-family="Arial, sans-serif" font-size="16" font-weight="700" fill="#334155">Холодная вода</text></g><g><rect x="850" y="275" width="250" height="38" rx="12" fill="#fff" stroke="#cbd5e1"/><circle cx="868" cy="294" r="6" fill="#ea580c"/><text x="884" y="300" font-family="Arial, sans-serif" font-size="16" font-weight="700" fill="#334155">Рубашка теплообмена</text></g><g><rect x="850" y="575" width="240" height="38" rx="12" fill="#fff" stroke="#cbd5e1"/><circle cx="868" cy="594" r="6" fill="#ea580c"/><text x="884" y="600" font-family="Arial, sans-serif" font-size="16" font-weight="700" fill="#334155">Слив нагретой воды</text></g>

<g transform="translate(80 684)"><rect width="340" height="26" rx="13" fill="#0284c7" opacity=".12"/><text x="16" y="19" font-family="Arial, sans-serif" font-size="13" font-weight="700" fill="#0284c7">УСЛОВНАЯ ИНЖЕНЕРНАЯ СХЕМА • НЕ МОНТАЖНЫЙ ЧЕРТЁЖ</text></g>
</svg>