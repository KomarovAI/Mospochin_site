<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="760" viewBox="0 0 1200 760" role="img" aria-labelledby="title desc">
<title id="title">Основные системы пищеварочного котла</title><desc id="desc">Нагрев, рубашка, мешалка, слив и управление проверяются как отдельные контуры.</desc>
<defs>
