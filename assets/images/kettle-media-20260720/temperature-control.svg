<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="760" viewBox="0 0 1200 760" role="img" aria-labelledby="title desc">
<title id="title">Температурные датчики и защита</title><desc id="desc">Датчик продукта, датчик рубашки и независимый термостат выполняют разные функции.</desc>
<defs>
