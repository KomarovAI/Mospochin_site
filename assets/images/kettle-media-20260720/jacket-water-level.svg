<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="760" viewBox="0 0 1200 760" role="img" aria-labelledby="title desc">
<title id="title">Рубашка и контроль уровня воды</title><desc id="desc">Нагрев разрешается только при подтверждённом уровне теплоносителя в пароводяной рубашке.</desc>
<defs>
  <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1"><stop stop-color="#f8fafc"/><stop offset="1" stop-color="#eef2f7"/></linearGradient>
  <linearGradient id="steel" x1="0" y1="0" x2="1" y2="0"><stop stop-color="#cbd5e1"/><stop offset=".45" stop-color="#f8fafc"/><stop offset="1" stop-color="#94a3b8"/></linearGradient>
  <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="10" stdDeviation="12" flood-color="#0f172a" flood-opacity=".15"/></filter>
  <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth"><path d="M0,0 L0,6 L9,3 z" fill="#0369a1"/></marker>
</defs>
<rect width="1200" height="760" rx="36" fill="url(#bg)"/>
<rect x="40" y="38" width="1120" height="684" rx="28" fill="#fff" stroke="#dbe3ec"/>
<text x="80" y="100" font-family="Arial, sans-serif" font-size="34" font-weight="800" fill="#0f172a">Рубашка и контроль уровня воды</text>
<text x="80" y="137" font-family="Arial, sans-serif" font-size="18" fill="#475569">Нагрев разрешается только при подтверждённом уровне теплоносителя в пароводяной рубашке.</text>
<g filter="url(#shadow)">
<path d="M470,260 Q630.0,202 790,260 L764,532 Q630.0,595 496,532 Z" fill="url(#steel)" stroke="#64748b" stroke-width="4"/>
<path d="M498,282 Q630.0,240 762,282 L738,496 Q630.0,538 522,496 Z" fill="#e0f2fe" stroke="#7dd3fc" stroke-width="3"/>
<ellipse cx="630.0" cy="260" rx="160.0" ry="48" fill="#f8fafc" stroke="#64748b" stroke-width="4"/>
<ellipse cx="630.0" cy="268" rx="126.0" ry="32" fill="#c7d2fe" opacity=".75"/>
<rect x="506" y="542" width="34" height="86" rx="10" fill="#64748b"/><rect x="720" y="542" width="34" height="86" rx="10" fill="#64748b"/>
</g>
<path d="M500 430 Q630 475 760 430 L745 520 Q630 565 515 520 Z" fill="#38bdf8" opacity=".75"/>
<path d="M540 260 V455" stroke="#334155" stroke-width="10"/><circle cx="540" cy="465" r="16" fill="#f59e0b"/>
<path d="M820 270 V520" stroke="#64748b" stroke-width="6" stroke-dasharray="14 10"/><path d="M800 430 H840" stroke="#0ea5e9" stroke-width="8"/>
<g><rect x="90" y="245" width="210" height="38" rx="12" fill="#fff" stroke="#cbd5e1"/><circle cx="108" cy="264" r="6" fill="#ea580c"/><text x="124" y="270" font-family="Arial, sans-serif" font-size="16" font-weight="700" fill="#334155">Вода в рубашке</text></g><g><rect x="90" y="335" width="210" height="38" rx="12" fill="#fff" stroke="#cbd5e1"/><circle cx="108" cy="354" r="6" fill="#ea580c"/><text x="124" y="360" font-family="Arial, sans-serif" font-size="16" font-weight="700" fill="#334155">Контрольный электрод</text></g><g><rect x="90" y="425" width="210" height="38" rx="12" fill="#fff" stroke="#cbd5e1"/><circle cx="108" cy="444" r="6" fill="#ea580c"/><text x="124" y="450" font-family="Arial, sans-serif" font-size="16" font-weight="700" fill="#334155">Защита сухого хода</text></g><g><rect x="855" y="445" width="220" height="38" rx="12" fill="#fff" stroke="#cbd5e1"/><circle cx="873" cy="464" r="6" fill="#ea580c"/><text x="889" y="470" font-family="Arial, sans-serif" font-size="16" font-weight="700" fill="#334155">Контроль уровня</text></g>

<g transform="translate(80 684)"><rect width="340" height="26" rx="13" fill="#0369a1" opacity=".12"/><text x="16" y="19" font-family="Arial, sans-serif" font-size="13" font-weight="700" fill="#0369a1">УСЛОВНАЯ ИНЖЕНЕРНАЯ СХЕМА • НЕ МОНТАЖНЫЙ ЧЕРТЁЖ</text></g>
