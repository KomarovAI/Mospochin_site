<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="760" viewBox="0 0 1200 760" role="img" aria-labelledby="title desc">
<title id="title">Как читать код ошибки</title><desc id="desc">Код связывается с моделью, редакцией контроллера, системой и результатами измерений.</desc>
<defs>
  <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1"><stop stop-color="#f8fafc"/><stop offset="1" stop-color="#eef2f7"/></linearGradient>
  <linearGradient id="steel" x1="0" y1="0" x2="1" y2="0"><stop stop-color="#cbd5e1"/><stop offset=".45" stop-color="#f8fafc"/><stop offset="1" stop-color="#94a3b8"/></linearGradient>
  <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="10" stdDeviation="12" flood-color="#0f172a" flood-opacity=".15"/></filter>
  <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth"><path d="M0,0 L0,6 L9,3 z" fill="#ea580c"/></marker>
</defs>
<rect width="1200" height="760" rx="36" fill="url(#bg)"/>
<rect x="40" y="38" width="1120" height="684" rx="28" fill="#fff" stroke="#dbe3ec"/>
<text x="80" y="100" font-family="Arial, sans-serif" font-size="34" font-weight="800" fill="#0f172a">Как читать код ошибки</text>
<text x="80" y="137" font-family="Arial, sans-serif" font-size="18" fill="#475569">Код связывается с моделью, редакцией контроллера, системой и результатами измерений.</text>

<g filter="url(#shadow)"><rect x="90" y="230" width="220" height="180" rx="24" fill="#0f172a"/><rect x="125" y="270" width="150" height="70" rx="12" fill="#ef4444"/><text x="161" y="320" font-family="Arial" font-size="40" font-weight="900" fill="#fff">E04</text></g>
<path d="M320 320 H420" stroke="#ea580c" stroke-width="8" marker-end="url(#arrow)"/>
<g><rect x="440" y="220" width="250" height="200" rx="24" fill="#f8fafc" stroke="#94a3b8" stroke-width="4"/><text x="475" y="270" font-family="Arial" font-size="18" font-weight="800" fill="#0f172a">Модель и контроллер</text><text x="475" y="315" font-family="Arial" font-size="17" fill="#475569">• шильдик</text><text x="475" y="350" font-family="Arial" font-size="17" fill="#475569">• редакция</text><text x="475" y="385" font-family="Arial" font-size="17" fill="#475569">• полный экран</text></g>
<path d="M700 320 H800" stroke="#ea580c" stroke-width="8" marker-end="url(#arrow)"/>
<g><rect x="820" y="220" width="280" height="200" rx="24" fill="#0f172a"/><text x="855" y="270" font-family="Arial" font-size="18" font-weight="800" fill="#fff">Проверяем систему</text><text x="855" y="315" font-family="Arial" font-size="17" fill="#cbd5e1">датчик • проводка</text><text x="855" y="350" font-family="Arial" font-size="17" fill="#cbd5e1">защита • нагрузка</text><text x="855" y="385" font-family="Arial" font-size="17" fill="#cbd5e1">питание • плата</text></g>
<path d="M960 430 V520 H650" stroke="#ea580c" stroke-width="8" marker-end="url(#arrow)"/>
<rect x="380" y="500" width="280" height="110" rx="22" fill="#ecfdf5" stroke="#22c55e" stroke-width="4"/><text x="420" y="548" font-family="Arial" font-size="19" font-weight="800" fill="#166534">Вывод по измерениям</text><text x="420" y="580" font-family="Arial" font-size="16" fill="#166534">а не только по коду</text>

<g transform="translate(80 684)"><rect width="340" height="26" rx="13" fill="#ea580c" opacity=".12"/><text x="16" y="19" font-family="Arial, sans-serif" font-size="13" font-weight="700" fill="#ea580c">УСЛОВНАЯ ИНЖЕНЕРНАЯ СХЕМА • НЕ МОНТАЖНЫЙ ЧЕРТЁЖ</text></g>
</svg>