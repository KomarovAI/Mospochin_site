<ellipse cx="740.0" cy="288" rx="96.0" ry="32" fill="#c7d2fe" opacity=".75"/>
<rect x="646" y="502" width="34" height="86" rx="10" fill="#64748b"/><rect x="800" y="502" width="34" height="86" rx="10" fill="#64748b"/>
