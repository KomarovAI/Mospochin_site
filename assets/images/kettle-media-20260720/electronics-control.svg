<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="760" viewBox="0 0 1200 760" role="img" aria-labelledby="title desc">
<title id="title">Электроника и внешние нагрузки</title><desc id="desc">Плата получает сигналы датчиков и управляет контакторами, клапанами и приводами.</desc>
<defs>
  <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1"><stop stop-color="#f8fafc"/><stop offset="1" stop-color="#eef2f7"/></linearGradient>
  <linearGradient id="steel" x1="0" y1="0" x2="1" y2="0"><stop stop-color="#cbd5e1"/><stop offset=".45" stop-color="#f8fafc"/><stop offset="1" stop-color="#94a3b8"/></linearGradient>
  <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="10" stdDeviation="12" flood-color="#0f172a" flood-opacity=".15"/></filter>
  <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth"><path d="M0,0 L0,6 L9,3 z" fill="#7c3aed"/></marker>
</defs>
<rect width="1200" height="760" rx="36" fill="url(#bg)"/>
<rect x="40" y="38" width="1120" height="684" rx="28" fill="#fff" stroke="#dbe3ec"/>
<text x="80" y="100" font-family="Arial, sans-serif" font-size="34" font-weight="800" fill="#0f172a">Электроника и внешние нагрузки</text>
<text x="80" y="137" font-family="Arial, sans-serif" font-size="18" fill="#475569">Плата получает сигналы датчиков и управляет контакторами, клапанами и приводами.</text>
