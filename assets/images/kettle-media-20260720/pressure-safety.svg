<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="760" viewBox="0 0 1200 760" role="img" aria-labelledby="title desc">
<title id="title">Давление и защитная арматура</title><desc id="desc">Манометр показывает состояние, а предохранительный клапан остаётся последним защитным устройством.</desc>
<defs>
  <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1"><stop stop-color="#f8fafc"/><stop offset="1" stop-color="#eef2f7"/></linearGradient>
  <linearGradient id="steel" x1="0" y1="0" x2="1" y2="0"><stop stop-color="#cbd5e1"/><stop offset=".45" stop-color="#f8fafc"/><stop offset="1" stop-color="#94a3b8"/></linearGradient>
  <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="10" stdDeviation="12" flood-color="#0f172a" flood-opacity=".15"/></filter>
  <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth"><path d="M0,0 L0,6 L9,3 z" fill="#b91c1c"/></marker>
</defs>
<rect width="1200" height="760" rx="36" fill="url(#bg)"/>
<rect x="40" y="38" width="1120" height="684" rx="28" fill="#fff" stroke="#dbe3ec"/>
<text x="80" y="100" font-family="Arial, sans-serif" font-size="34" font-weight="800" fill="#0f172a">Давление и защитная арматура</text>
<text x="80" y="137" font-family="Arial, sans-serif" font-size="18" fill="#475569">Манометр показывает состояние, а предохранительный клапан остаётся последним защитным устройством.</text>
<g filter="url(#shadow)">
<path d="M470,260 Q630.0,202 790,260 L764,532 Q630.0,595 496,532 Z" fill="url(#steel)" stroke="#64748b" stroke-width="4"/>
<path d="M498,282 Q630.0,240 762,282 L738,496 Q630.0,538 522,496 Z" fill="#e0f2fe" stroke="#7dd3fc" stroke-width="3"/>
<ellipse cx="630.0" cy="260" rx="160.0" ry="48" fill="#f8fafc" stroke="#64748b" stroke-width="4"/>
<ellipse cx="630.0" cy="268" rx="126.0" ry="32" fill="#c7d2fe" opacity=".75"/>
<rect x="506" y="542" width="34" height="86" rx="10" fill="#64748b"/><rect x="720" y="542" width="34" height="86" rx="10" fill="#64748b"/>
</g>
<circle cx="870" cy="280" r="76" fill="#fff" stroke="#334155" stroke-width="10"/><path d="M870 280 L910 240" stroke="#ef4444" stroke-width="8"/><path d="M870 356 V430" stroke="#475569" stroke-width="12"/>
<rect x="975" y="250" width="100" height="150" rx="20" fill="#64748b"/><path d="M1025 250 V190" stroke="#64748b" stroke-width="18"/><path d="M995 210 H1055" stroke="#ef4444" stroke-width="12"/>
<path d="M805 470 C850 420 920 420 965 470" fill="none" stroke="#ea580c" stroke-width="7" marker-end="url(#arrow)"/>
<g><rect x="80" y="245" width="210" height="38" rx="12" fill="#fff" stroke="#cbd5e1"/><circle cx="98" cy="264" r="6" fill="#ea580c"/><text x="114" y="270" font-family="Arial, sans-serif" font-size="16" font-weight="700" fill="#334155">Давление рубашки</text></g><g><rect x="80" y="335" width="210" height="38" rx="12" fill="#fff" stroke="#cbd5e1"/><circle cx="98" cy="354" r="6" fill="#ea580c"/><text x="114" y="360" font-family="Arial, sans-serif" font-size="16" font-weight="700" fill="#334155">Манометр</text></g><g><rect x="80" y="425" width="210" height="38" rx="12" fill="#fff" stroke="#cbd5e1"/><circle cx="98" cy="444" r="6" fill="#ea580c"/><text x="114" y="450" font-family="Arial, sans-serif" font-size="16" font-weight="700" fill="#334155">Защитный клапан</text></g><g><rect x="80" y="515" width="210" height="38" rx="12" fill="#fff" stroke="#cbd5e1"/><circle cx="98" cy="534" r="6" fill="#ea580c"/><text x="114" y="540" font-family="Arial, sans-serif" font-size="16" font-weight="700" fill="#334155">Ограничение нагрева</text></g>

<g transform="translate(80 684)"><rect width="340" height="26" rx="13" fill="#b91c1c" opacity=".12"/><text x="16" y="19" font-family="Arial, sans-serif" font-size="13" font-weight="700" fill="#b91c1c">УСЛОВНАЯ ИНЖЕНЕРНАЯ СХЕМА • НЕ МОНТАЖНЫЙ ЧЕРТЁЖ</text></g>
