t="128" rx="24" fill="#ffffff" stroke="#0ea5e9" stroke-width="3" filter="url(#shadow)"/><circle cx="812" cy="268" r="22" fill="#0ea5e9"/><text x="812" y="276" text-anchor="middle" font-family="Inter,Arial,sans-serif" font-size="22" font-weight="800" fill="#fff">3</text><text x="846" y="280" font-family="Inter,Arial,sans-serif" font-size="20" font-weight="700" fill="#0f172a">Кассета</text><rect x="78" y="432" width="300" height="128" rx="24" fill="#ffffff" stroke="#22c55e" stroke-width="3" filter="url(#shadow)"/><circle cx="116" cy="470" r="22" fill="#22c55e"/><text x="116" y="478" text-anchor="middle" font-family="Inter,Arial,sans-serif" font-size="22" font-weight="800" fill="#fff">4</text><text x="150" y="482" font-family="Inter,Arial,sans-serif" font-size="20" font-weight="700" fill="#0f172a">Зазор</text><rect x="426" y="432" width="300" height="128" rx="24" fill="#ffffff" stroke="#0ea5e9" stroke-width="3" filter="url(#shadow)"/><circle cx="464" cy="470" r="22" fill="#0ea5e9"/><text x="464" y="478" text-anchor="middle" font-family="Inter,Arial,sans-serif" font-size="22" font-weight="800" fill="#fff">5</text><text x="498" y="482" font-family="Inter,Arial,sans-serif" font-size="20" font-weight="700" fill="#0f172a">Жиросборник</text><rect x="774" y="432" width="300" height="128" rx="24" fill="#ffffff" stroke="#22c55e" stroke-width="3" filter="url(#shadow)"/><circle cx="812" cy="470" r="22" fill="#22c55e"/><text x="812" y="478" text-anchor="middle" font-family="Inter,Arial,sans-serif" font-size="22" font-weight="800" fill="#fff">6</text><text x="846" y="482" font-family="Inter,Arial,sans-serif" font-size="20" font-weight="700" fill="#0f172a">Поток воздуха</text><path d="M378 294.0 L414 294.0" stroke="#64748b" stroke-width="4" fill="none" marker-end="url(#arrow)"/><path d="M726 294.0 L762 294.0" stroke="#64748b" stroke-width="4" fill="none" marker-end="url(#arrow)"/><path d="M924.0 358 C924.0 403, 228.0 375, 228.0 420" stroke="#64748b" stroke-width="4" fill="none" mark