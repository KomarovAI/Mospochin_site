<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="760" viewBox="0 0 1200 760" role="img" aria-labelledby="title desc"><title id="title">Захват дыма над грилем</title><desc id="desc">Высокая тепловая нагрузка усиливает подъём и рассеивание дыма. Оценка проводится на рабочей мощности и с фактической загрузкой гриля.</desc><defs><marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto"><path d="M0,0 L0,6 L9,3 z" fill="#64748b"/></marker><filter id="shadow" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="8" stdDeviation="10" flood-opacity=".12"/></filter></defs><rect width="1200" height="760" rx="36" fill="#eff6ff"/><rect x="0" y="0" width="1200" height="170" rx="36" fill="#172554"/><rect x="0" y="130" width="1200" height="40" fill="#172554"/><text x="64" y="55" font-family="Inter,Arial,sans-serif" font-size="34" font-weight="800" fill="#fff">Захват дыма над грилем</text><text x="64" y="130" font-family="Inter,Arial,sans-serif" font-size="19" fill="#cbd5e1">Высокая тепловая нагрузка усиливает подъём и рассеивание дыма</text><rect x="78" y="230" width="300" height="128" rx="24" fill="#ffffff" stroke="#2563eb" stroke-width="3" filter="url(#shadow)"/><circle cx="116" cy="268" r="22" fill="#2563eb"/><text x="116" y="276" text-anchor="middle" font-family="Inter,Arial,sans-serif" font-size="22" font-weight="800" fill="#fff">1</text><text x="150" y="280" font-family="Inter,Arial,sans-serif" font-size="20" font-weight="700" fill="#0f172a">Гриль</text><rect x="426" y="230" width="300" height="128" rx="24" fill="#ffffff" stroke="#f59e0b" stroke-width="3" filter="url(#shadow)"/><circle cx="464" cy="268" r="22" fill="#f59e0b"/><text x="464" y="276" text-anchor="middle" font-family="Inter,Arial,sans-serif" font-size="22" font-weight="800" fill="#fff">2</text><text x="498" y="280" font-family="Inter,Arial,sans-serif" font-size="20" font-weight="700" fill="#0f172a">Дымовой факел</text><rect x="774" y="230" width="300" height="128" rx="24" fill="#ffffff" stroke="#2563eb" stroke-width="3" filter="url(#shadow)"/><circle cx="812" cy="268" r="22" fill="#2563eb"/><text x="812" y="276" text-anchor="middle" font-family="Inter,Arial,sans-serif" font-size="22" font-weight="800" fill="#fff">3</text><text x="846" y="280" font-family="Inter,Arial,sans-serif" font-size="20" font-weight="700" fill="#0f172a">Зонт</text><rect x="78" y="432" width="300" height="128" rx="24" fill="#ffffff" stroke="#f59e0b" stroke-width="3" filter="url(#shadow)"/><circle cx="116" cy="470" r="22" fill="#f59e0b"/><text x="116" y="478" text-anchor="middle" font-family="Inter,Arial,sans-serif" font-size="22" font-weight="800" fill="#fff">4</text><text x="150" y="482" font-family="Inter,Arial,sans-serif" font-size="20" font-weight="700" fill="#0f172a">Фильтры</text><rect x="426" y="432" width="300" height="128" rx="24" fill="#ffffff" stroke="#2563eb" stroke-width="3" filter="url(#shadow)"/><circle cx="464" cy="470" r="22" fill="#2563eb"/><text x="464" y="478" text-anchor="middle" font-family="Inter,Arial,sans-serif" font-size="22" font-weight="800" fill="#fff">5</text><text x="498" y="482" font-family="Inter,Arial,sans-serif" font-size="20" font-weight="700" fill="#0f172a">Вытяжной расход</text><rect x="774" y="432" width="300" height="128" rx="24" fill="#ffffff" stroke="#f59e0b" stroke-width="3" filter="url(#shadow)"/><circle cx="812" cy="470" r="22" fill="#f59e0b"/><text x="812" y="478" text-anchor="middle" font-family="Inter,Arial,sans-serif" font-size="22" font-weight="800" fill="#fff">6</text><text x="846" y="482" font-family="Inter,Arial,sans-serif" font-size="20" font-weight="700" fill="#0f172a">Боковой поток</text><path d="M378 294.0 L414 294.0" stroke="#64748b" stroke-width="4" fill="none" marker-end="url(#arrow)"/><path d="M726 294.0 L762 294.0" stroke="#64748b" stroke-width="4" fill="none" marker-end="url(#arrow)"/><path d="M924.0 358 C924.0 403, 228.0 375, 228.0 420" stroke="#64748b" stroke-width="4" fill="none" marker-end="url(#arrow)"/><path d="M378 496.0 L414 496.0" stroke="#64748b" stroke-width="4" fill="none" marker-end="url(#arrow)"/><path d="M726 496.0 L762 496.0" stroke="#64748b" stroke-width="4" fill="none" marker-end="url(#arrow)"/><rect x="78" y="650" width="1044" height="68" rx="18" fill="#172554" opacity=".96"/><text x="108" y="692" font-family="Inter,Arial,sans-serif" font-size="19" font-weight="650" fill="#fff">Оценка проводится на рабочей мощности и с фактической загрузкой гриля.</text></svg>