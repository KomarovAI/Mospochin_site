# MosPochin form backend proxy.
# Add inside the active server { ... } block for mospochin.ru, then run: sudo nginx -t && sudo systemctl reload nginx

location = /api/send-telegram {
    proxy_pass http://127.0.0.1:3010/api/send-telegram;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_read_timeout 15s;
    proxy_connect_timeout 5s;
    proxy_send_timeout 15s;
}
