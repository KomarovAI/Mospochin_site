<section id="self-check" class="bg-white py-16 lg:py-24" data-site-view-event="symptom_selfcheck_started"><div class="mx-auto max-w-6xl px-4 sm:px-6 lg:px-8"><p class="text-sm font-extrabold uppercase tracking-[0.2em] text-brand-orange">{{eyebrow}}</p><h2 class="mt-3 max-w-3xl text-3xl font-display font-extrabold text-brand-blue">{{title}}</h2><p class="mt-4 max-w-3xl text-lg leading-relaxed text-slate-600">{{intro}}</p><ol class="mt-8 grid gap-4 md:grid-cols-3"><li class="rounded-2xl border border-slate-200 bg-white p-5"><span class="text-sm font-extrabold text-brand-orange">{{items.0.number}}</span><p class="mt-2 leading-relaxed text-slate-700">{{items.0.text}}</p></li><li class="rounded-2xl border border-slate-200 bg-white p-5"><span class="text-sm font-extrabold text-brand-orange">{{items.1.number}}</span><p class="mt-2 leading-relaxed text-slate-700">{{items.1.text}}</p></li><li class="rounded-2xl border border-slate-200 bg-white p-5"><span class="text-sm font-extrabold text-brand-orange">{{items.2.number}}</span><p class="mt-2 leading-relaxed text-slate-700">{{items.2.text}}</p></li></ol><a class="mt-8 inline-flex rounded-xl bg-brand-blue px-5 py-3 font-extrabold text-white" href="#request" data-cta-id="{{ctaId}}" data-cta-group="lead_form" data-block="after_selfcheck" data-site-event="cta_after_selfcheck">{{ctaText}}</a></div></section>
