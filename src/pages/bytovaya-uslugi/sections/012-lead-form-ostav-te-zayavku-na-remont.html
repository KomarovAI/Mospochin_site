
    <section id="request" class="py-20 lg:py-28 bg-gradient-to-br from-green-50 to-blue-50">
        <div class="max-w-3xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="text-center mb-12 scroll-reveal">
                <span class="inline-block bg-green-100 text-green-700 px-4 py-2 rounded-full text-sm font-bold mb-4">ЗАЯВКА</span>
                <h2 class="text-3xl lg:text-4xl font-display font-extrabold text-brand-blue mb-4 heading-reveal">Оставьте заявку на ремонт</h2>
                <p class="text-slate-600 text-lg max-w-2xl mx-auto">Опишите поломку и оставьте номер. Мы быстро перезвоним, уточним симптомы и объясним, как пройдёт ремонт у вас дома.</p>
            </div>
            <form class="telegram-form bg-white p-8 lg:p-10 rounded-2xl shadow-lg border border-slate-200 scroll-reveal" action="/api/send-telegram" method="post" data-form-id="bytovaya-uslugi_telegram_form_1" data-form-context="repair">
                <div class="grid md:grid-cols-2 gap-6 mb-6">
                    <div>
                        <label for="bytovaya-uslugi-name" class="block text-sm font-medium text-slate-700 mb-2">Ваше имя *</label>
                        <input type="text" name="name" required placeholder="Елена" class="w-full px-4 py-3 border-2 border-slate-200 rounded-xl focus:border-green-500 focus:ring-2 focus:ring-green-500/20 transition text-slate-700" id="bytovaya-uslugi-name" autocomplete="name">
                    </div>
                    <div>
                        <label for="bytovaya-uslugi-phone" class="block text-sm font-medium text-slate-700 mb-2">Телефон *</label>
                        <input type="tel" name="phone" required placeholder="+7 (___) ___-__-__" class="w-full px-4 py-3 border-2 border-slate-200 rounded-xl focus:border-green-500 focus:ring-2 focus:ring-green-500/20 transition text-slate-700" id="bytovaya-uslugi-phone" autocomplete="tel" inputmode="tel">
                    </div>
                </div>
                <div class="grid md:grid-cols-2 gap-6 mb-6">
                    <div>
                        <label for="bytovaya-uslugi-type" class="block text-sm font-medium text-slate-700 mb-2">Что сломалось?</label>
                        <select name="type" class="w-full px-4 py-3 border-2 border-slate-200 rounded-xl focus:border-green-500 focus:ring-2 focus:ring-green-500/20 transition text-slate-700" id="bytovaya-uslugi-type">
                            <option value="">Выберите технику</option>
                            <option value="Холодильник">Холодильник</option>
                            <option value="Стиральная машина">Стиральная машина</option>
                            <option value="Посудомоечная машина">Посудомоечная машина</option>
                            <option value="Плита/Духовка">Плита / Духовка</option>
                            <option value="Микроволновка">Микроволновка</option>
                            <option value="Водонагреватель">Водонагреватель</option>
                            <option value="Другое">Другое</option>
                        </select>
                    </div>
                    <div>
                        <label for="bytovaya-uslugi-problem" class="block text-sm font-medium text-slate-700 mb-2">Что случилось?</label>
                        <input type="text" name="problem" placeholder="Например: не сливает воду, не морозит, выбивает автомат" class="w-full px-4 py-3 border-2 border-slate-200 rounded-xl focus:border-green-500 focus:ring-2 focus:ring-green-500/20 transition text-slate-700" id="bytovaya-uslugi-problem">
                    </div>
                </div>
                <button type="submit" class="w-full bg-green-600 hover:bg-green-700 text-white text-lg font-bold px-8 py-4 rounded-xl transition shadow-lg" data-cta-id="bytovaya-uslugi_form_submit_1" data-cta-group="form_submit" data-block="auto">
                    <i class="ri-send-plane-line mr-2"></i>Получить звонок по ремонту
                </button>
                <p class="text-center text-slate-400 text-sm mt-4"><i class="ri-lock-line mr-1"></i>Используем данные только для связи по этой заявке</p>
            </form>
        </div>
    </section>
