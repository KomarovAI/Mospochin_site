
    <script>
    (function() {
        const dot = document.getElementById('live-dot');
        const status = document.getElementById('live-status');
        const sub = document.getElementById('live-sub');
        if (!dot || !status) return;
        const now = new Date();
        const hour = now.getHours();
        // 24/7 - always open
        dot.className = 'w-5 h-5 bg-green-500 rounded-full animate-pulse';
        status.textContent = 'Сейчас работаем';
        status.className = 'text-green-600 font-bold text-lg';
        if (hour >= 9 && hour < 22) {
            sub.textContent = 'Оператор на связи';
        } else {
            sub.textContent = 'Ночной дежурный мастер';
        }
    })();
    </script>
