location = /oshibki-pri-ekspluatatsii-vytyazhki-restorana.html { return 301 /chek-list-ventilyatsii-restorana.html; }
location = /pochemu-vytyazhka-ne-tyanet-v-restorane.html { return 301 /ventilyatsiya-restorana-ne-tyanet.html; }
location = /ventilyatsiya-i-posudomoechnaya-zona.html { return 301 /ventilyatsiya-moechnoj-zony.html; }
