# MosPochin runtime hardening.
# Include inside the production `server {}` block.

# Build/runtime internals must exist on disk for deployment and the Telegram API,
# but must never be downloadable from the public web root.
location ~ ^/(?:server|tools|deploy|\.deploy)(?:/|$) {
    return 404;
}

location = /package.json {
    return 404;
}

# Core shell files are deliberately revalidated on every navigation/deploy.
# This prevents a new HTML release from being paired with stale CSS/JS.
location ~ ^/(?:styles-combined\.css|main\.js|analytics\.js|telegram-form\.js|ventilation-(?:media|navigation|conversion)\.css|ventilation-conversion\.js)$ {
    expires -1;
    add_header Cache-Control "no-cache, no-store, must-revalidate" always;
    try_files $uri =404;
}

# Cheap transfer-size reduction for static text assets.
gzip on;
gzip_vary on;
gzip_min_length 1024;
gzip_comp_level 5;
gzip_types
    text/plain
    text/css
    text/javascript
    application/javascript
    application/json
    application/ld+json
    application/xml
    image/svg+xml;

# Legacy typo redirect for the parokonvektomat maintenance page.
location = /parokonvektomat-obschuzhivanie.html { return 301 /parokonvektomat-obsluzhivanie.html; }

# Consolidate duplicate Abat/KPEM landing page.
location = /pishevarochnyj-kotel-abat-kpem.html { return 301 /remont-pishevarochnyh-kotlov-kpem.html; }

# Restaurant ventilation canonical consolidation (RUN 15).
