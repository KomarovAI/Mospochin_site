name: Recover via staged release and deploy

on:
  workflow_dispatch:

concurrency:
  group: vps-deploy
  cancel-in-progress: false

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  RECOVERY_RELEASE_SHA_PRIMARY: 1163804cb637b76b9ea292f9d106944f860404a9
  RECOVERY_RELEASE_SHA_FALLBACK: e70a316d31e7147aaa044f908b60b3855349c994

jobs:
  recover-and-deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Calculate deploy content hash
        shell: bash
        run: |
          set -euo pipefail
          node tools/hash-deploy-content.mjs

      - name: Setup SSH
        shell: bash
        run: |
          set -euo pipefail

          mkdir -p ~/.ssh
          chmod 700 ~/.ssh

          printf '%s\n' "${{ secrets.DEPLOY_SSH_KEY }}" \
            > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key

          ssh-keyscan \
            -p "${{ secrets.DEPLOY_PORT }}" \
            "${{ secrets.DEPLOY_HOST }}" \
            >> ~/.ssh/known_hosts

      - name: Select staged repaired release
        id: staged
        shell: bash
        run: |
          set -euo pipefail

          SSH_ARGS=(
            -i ~/.ssh/deploy_key
            -p "${{ secrets.DEPLOY_PORT }}"
            -o IdentitiesOnly=yes
            -o BatchMode=yes
            -o StrictHostKeyChecking=yes
            -o ConnectTimeout=15
            -o ServerAliveInterval=15
            -o ServerAliveCountMax=3
          )

          REMOTE="${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }}"

          find_candidate() {
            local sha="$1"

            ssh "${SSH_ARGS[@]}" "$REMOTE" \
              "find /var/www/mospochin-releases \
                -mindepth 1 \
                -maxdepth 1 \
                -type d \
                -name '${sha}-*' \
                -printf '%T@|%p\n' 2>/dev/null \
               | sort -t'|' -k1,1nr \
               | head -n 1 \
               | cut -d'|' -f2-"
          }

          CANDIDATE="$(find_candidate "$RECOVERY_RELEASE_SHA_PRIMARY")"

          if [[ -z "$CANDIDATE" ]]; then
            CANDIDATE="$(find_candidate "$RECOVERY_RELEASE_SHA_FALLBACK")"
          fi

          [[ -n "$CANDIDATE" ]] || {
            echo "ERROR: no staged repaired release found" >&2

            ssh "${SSH_ARGS[@]}" "$REMOTE" \
              "find /var/www/mospochin-releases \
                -mindepth 1 \
                -maxdepth 1 \
                -type d \
                -printf '%TY-%Tm-%TdT%TH:%TM:%TS %p\n' 2>/dev/null \
               | sort -r \
               | head -n 30" \
              >&2 || true

            exit 71
          }

          case "$CANDIDATE" in
            /var/www/mospochin-releases/*) ;;
            *)
              echo "ERROR: unsafe candidate path: $CANDIDATE" >&2
              exit 72
              ;;
          esac

          echo "STAGED_RELEASE=$CANDIDATE"

          # Selection is intentionally limited to an exact known commit path.
          # Do not duplicate the approved activator's own release validation.
          # mospochin-activate-release is the authoritative validator/executor.
          echo "STAGED_RELEASE_SELECTION=PASS"
          echo "STAGED_RELEASE_VALIDATION=DELEGATED_TO_ACTIVATOR"

          printf 'release=%s\n' "$CANDIDATE" >> "$GITHUB_OUTPUT"

      - name: Run approved deploy doctor before recovery
        shell: bash
        continue-on-error: true
        run: |
          set -o pipefail

          ssh \
            -i ~/.ssh/deploy_key \
            -p "${{ secrets.DEPLOY_PORT }}" \
            -o IdentitiesOnly=yes \
            -o BatchMode=yes \
            -o StrictHostKeyChecking=yes \
            -o ConnectTimeout=15 \
            "${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }}" \
            "sudo -n /usr/local/sbin/mospochin-deploy-doctor"

      - name: Activate staged repaired release
        shell: bash
        timeout-minutes: 8
        run: |
          set -euo pipefail

          RELEASE="${{ steps.staged.outputs.release }}"

          case "$RELEASE" in
            /var/www/mospochin-releases/*) ;;
            *)
              echo "ERROR: unsafe release path: $RELEASE" >&2
              exit 73
              ;;
          esac

          echo "ACTIVATING_STAGED_RELEASE=$RELEASE"

          ssh \
            -i ~/.ssh/deploy_key \
            -p "${{ secrets.DEPLOY_PORT }}" \
            -o IdentitiesOnly=yes \
            -o BatchMode=yes \
            -o StrictHostKeyChecking=yes \
            -o ConnectTimeout=15 \
            -o ServerAliveInterval=15 \
            -o ServerAliveCountMax=3 \
            "${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }}" \
            "sudo -n /usr/local/sbin/mospochin-activate-release '$RELEASE'"

      - name: Approved healthcheck after staged activation
        shell: bash
        timeout-minutes: 4
        run: |
          set -euo pipefail

          ssh \
            -i ~/.ssh/deploy_key \
            -p "${{ secrets.DEPLOY_PORT }}" \
            -o IdentitiesOnly=yes \
            -o BatchMode=yes \
            -o StrictHostKeyChecking=yes \
            -o ConnectTimeout=15 \
            "${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }}" \
            "sudo -n /usr/local/sbin/mospochin-healthcheck"

      - name: Deploy current exact SHA
        shell: bash
        timeout-minutes: 10
        run: |
          set -euo pipefail

          CONTENT_HASH="$(cat .deploy/content.sha256)"

          echo "Commit: ${GITHUB_SHA}"
          echo "Run: ${GITHUB_RUN_ID}"
          echo "Content hash: ${CONTENT_HASH}"

          ssh \
            -i ~/.ssh/deploy_key \
            -p "${{ secrets.DEPLOY_PORT }}" \
            -o IdentitiesOnly=yes \
            -o BatchMode=yes \
            -o StrictHostKeyChecking=yes \
            -o ConnectTimeout=15 \
            -o ServerAliveInterval=15 \
            -o ServerAliveCountMax=3 \
            "${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }}" \
            "sudo -n /usr/local/sbin/mospochin-deploy-git \
              '${GITHUB_SHA}' \
              '${GITHUB_RUN_ID}' \
              '${GITHUB_RUN_NUMBER}' \
              '${CONTENT_HASH}'"

      - name: Verify production exact SHA
        shell: bash
        timeout-minutes: 5
        run: |
          set -euo pipefail

          VERSION=""

          for attempt in $(seq 1 45); do
            VERSION="$(
              curl \
                -fsS \
                --retry 5 \
                --retry-delay 3 \
                --retry-all-errors \
                --connect-timeout 8 \
                --max-time 25 \
                -H 'Cache-Control: no-cache' \
                "https://mospochin.ru/version.json?run=${GITHUB_RUN_ID}&attempt=${attempt}" \
              || true
            )"

            COMMIT="$(
              printf '%s' "$VERSION" |
                jq -r '.commit // empty' 2>/dev/null ||
                true
            )"

            RUN_ID="$(
              printf '%s' "$VERSION" |
                jq -r '.run_id // empty' 2>/dev/null ||
                true
            )"

            echo "VERSION_ATTEMPT=$attempt COMMIT=$COMMIT RUN_ID=$RUN_ID"

            if [[ "$COMMIT" == "$GITHUB_SHA" &&
                  "$RUN_ID" == "$GITHUB_RUN_ID" ]]; then
              printf '%s\n' "$VERSION" | jq .
              exit 0
            fi

            sleep 5
          done

          echo "ERROR: production did not confirm exact SHA/run" >&2
          printf '%s\n' "$VERSION" >&2
          exit 1

      - name: Verify ventilation redirects
        shell: bash
        timeout-minutes: 4
        run: |
          set -euo pipefail

          BASE_URL="https://mospochin.ru"
          PASS=0

          while IFS='|' read -r SOURCE TARGET; do
            HEADERS="$(
              curl \
                -sS \
                --retry 8 \
                --retry-delay 3 \
                --retry-all-errors \
                --connect-timeout 8 \
                --max-time 25 \
                -D - \
                -o /dev/null \
                "${BASE_URL}${SOURCE}?run=${GITHUB_RUN_ID}"
            )"

            CODE="$(
              printf '%s\n' "$HEADERS" |
                awk '/^HTTP\// {value=$2} END {print value}'
            )"

            LOCATION="$(
              printf '%s\n' "$HEADERS" |
                awk '
                  BEGIN {IGNORECASE=1}
                  /^location:/ {
                    sub(/\r$/, "")
                    sub(/^[^:]+:[[:space:]]*/, "")
                    print
                    exit
                  }
                '
            )"

            LOCATION_PATH="$LOCATION"
            LOCATION_PATH="${LOCATION_PATH#${BASE_URL}}"
            LOCATION_PATH="${LOCATION_PATH%%\?*}"

            echo "HTTP=$CODE SOURCE=$SOURCE LOCATION=${LOCATION:-none} EXPECTED=$TARGET"

            [[ "$CODE" == "301" ]]
            [[ "$LOCATION_PATH" == "$TARGET" ]]

            PASS=$((PASS + 1))
          done <<'REDIRECTS'
          /chto-proveryaet-inzhener-ventilyatsii.html|/diagnostika-ventilyatsii-restorana.html
          /kak-podgotovitsya-k-vyezdu-mastera-po-ventilyatsii.html|/diagnostika-ventilyatsii-restorana.html
          /kak-ponyat-chto-nuzhna-chistka-ventilyatsii.html|/chistka-ventilyatsii-restoranov.html
          /kanalnaya-ventilyatsiya-restorana.html|/remont-vozduhovodov-restorana.html
          /oshibki-pri-ekspluatatsii-vytyazhki-restorana.html|/chek-list-ventilyatsii-restorana.html
          /pochemu-vytyazhka-ne-tyanet-v-restorane.html|/ventilyatsiya-restorana-ne-tyanet.html
          /ventilyatsiya-i-posudomoechnaya-zona.html|/ventilyatsiya-moechnoj-zony.html
          /ventilyatsiya-kafe.html|/ventilyatsiya-restoranov.html
          REDIRECTS

          echo "REDIRECTS=$PASS/8"
          [[ "$PASS" == "8" ]]

      - name: Verify ventilation assets
        shell: bash
        timeout-minutes: 4
        run: |
          set -euo pipefail

          for PATHNAME in \
            /ventilyatsiya-restoranov.html \
            /remont-ventilyatsii-restoranov.html \
            /ventilation-navigation.css \
            /ventilation-conversion.css \
            /ventilation-conversion.js \
            /ventilation-media.css \
            /data/ventilation-navigation.json \
            /data/ventilation-conversion-pages.json \
            /data/ventilation-media-map.json \
            /data/ventilation-redirects.json
          do
            META="$(
              curl \
                -sS \
                --retry 8 \
                --retry-delay 3 \
                --retry-all-errors \
                --connect-timeout 8 \
                --max-time 25 \
                -o /dev/null \
                -w '%{http_code}\t%{size_download}' \
                "https://mospochin.ru${PATHNAME}?run=${GITHUB_RUN_ID}"
            )"

            CODE="${META%%$'\t'*}"
            SIZE="${META#*$'\t'}"

            echo "HTTP=$CODE SIZE=$SIZE PATH=$PATHNAME"

            [[ "$CODE" == "200" ]]
            [[ "${SIZE%%.*}" -gt 0 ]]
          done

          echo "ASSETS=10/10"

      - name: Write summary
        if: always()
        shell: bash
        run: |
          {
            echo "## MosPochin staged-release recovery"
            echo
            echo "- Commit: \`${GITHUB_SHA}\`"
            echo "- Run: \`${GITHUB_RUN_ID}\`"
            echo "- Recovery: approved \`mospochin-activate-release\`"
            echo "- Deployment: approved \`mospochin-deploy-git\`"
            echo "- Arbitrary sudo: **not used**"
            echo "- Local direct VPS access: **no**"
          } >> "$GITHUB_STEP_SUMMARY"
