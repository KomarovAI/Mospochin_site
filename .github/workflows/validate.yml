name: Validate Site

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Validate site
        run: npm run validate:site

      - name: Doctor changed pages
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            export GITHUB_BASE_SHA="${{ github.event.pull_request.base.sha }}"
          else
            export GITHUB_BASE_SHA="${{ github.event.before }}"
          fi
          export GITHUB_SHA="${{ github.sha }}"
          npm run doctor:changed-pages
