name: Manual visual audit

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  visual-audit:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci --no-audit --no-fund
      - run: npm run setup:visual:github
      - run: npm run audit:visual-smoke
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: visual-audit
          path: .artifacts/screenshots/visual-smoke/
          if-no-files-found: warn
