name: Manual targeted mobile visual audit

on:
  workflow_dispatch:
    inputs:
      manifest:
        description: Screenshot manifest path
        required: true
        default: data/household-dishwasher-screenshot-audit.json

permissions:
  contents: read

jobs:
  targeted-mobile:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci --no-audit --no-fund
      - run: npm run setup:visual:github
      - run: node tools/visual-local-capture.mjs --manifest "${{ inputs.manifest }}" --mode first-view --output .artifacts/screenshots/manual-targeted-mobile
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: targeted-mobile-visual-audit
          path: .artifacts/screenshots/manual-targeted-mobile/
          if-no-files-found: warn
