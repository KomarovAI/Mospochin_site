# Manual fallback only. Primary screenshots run locally through system Chromium.
name: Visual Targeted Mobile (manual fallback)
run-name: Manual targeted mobile fallback

on:
  workflow_dispatch:
    inputs:
      pages:
        description: 'Comma-separated page paths'
        type: string
        default: '/water-heaters.html,/contact.html,/about.html,/pishevarochnyj-kotel-abat-e01.html,/pishevarochnye-kotly.html'

permissions:
  contents: read
  actions: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  VISUAL_BASE_URL: https://mospochin.ru
  VISUAL_EXECUTION_MODE: github-manual-fallback

jobs:
  targeted-mobile:
    name: Targeted mobile deep screenshots
    runs-on: ubuntu-latest
    timeout-minutes: 12
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
      - run: npm ci
      - run: npm run setup:visual:github
      - env:
          VISUAL_TARGET_PAGES: ${{ inputs.pages }}
        timeout-minutes: 10
        run: node tools/visual-runner.mjs tools/visual-targeted-mobile-deep.mjs
      - uses: actions/upload-artifact@v4
        with:
          name: mospochin-targeted-mobile-deep-${{ github.sha }}-${{ github.run_id }}
          path: reports/visual-targeted-mobile
          retention-days: 5
