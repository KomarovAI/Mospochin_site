name: Deploy to VPS

on:
  push:
    branches: [main]
    paths:
      - "**/*.html"
      - "assets/**"
      - "data/**"
      - "deploy/**"
      - "server/**"
      - "tools/**"
      - "main.js"
      - "telegram-form.js"
      - "styles.css"
      - "sitemap.xml"
      - "package.json"
      - "package-lock.json"
      - ".github/workflows/deploy.yml"
  workflow_dispatch:

concurrency:
  group: vps-deploy
  cancel-in-progress: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Validate site
        run: npm run lint

      - name: Calculate deploy content hash
        run: npm run hash:deploy-content

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          printf '%s\n' "${{ secrets.DEPLOY_SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -p "${{ secrets.DEPLOY_PORT }}" "${{ secrets.DEPLOY_HOST }}" >> ~/.ssh/known_hosts

      - name: Check deployed content hash
        id: deploy_hash
        run: |
          local_hash="$(cat .deploy/content.sha256)"
          remote_hash="$(ssh -i ~/.ssh/deploy_key -p "${{ secrets.DEPLOY_PORT }}" -o IdentitiesOnly=yes -o BatchMode=yes -o StrictHostKeyChecking=yes -o ConnectTimeout=15 \
            "${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }}" \
            "cat /var/www/mospochin-shared/current-content.sha256 2>/dev/null || true")"
          if [ "$local_hash" = "$remote_hash" ]; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
            echo "local_hash=${local_hash}" >> "$GITHUB_OUTPUT"
            echo "remote_hash=${remote_hash}" >> "$GITHUB_OUTPUT"
            echo "Deploy skipped: published content hash is unchanged."
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
            echo "local_hash=${local_hash}" >> "$GITHUB_OUTPUT"
            echo "remote_hash=${remote_hash:-none}" >> "$GITHUB_OUTPUT"
            echo "Deploy required: content hash changed."
          fi

      - name: Deploy on VPS
        if: steps.deploy_hash.outputs.skip != 'true'
        timeout-minutes: 2
        run: |
          ssh -i ~/.ssh/deploy_key -p "${{ secrets.DEPLOY_PORT }}" -o IdentitiesOnly=yes -o BatchMode=yes -o StrictHostKeyChecking=yes -o ConnectTimeout=15 \
            "${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }}" \
            "sudo /usr/local/sbin/mospochin-deploy-git '${GITHUB_SHA}' '${GITHUB_RUN_ID}' '${GITHUB_RUN_NUMBER}' '$(cat .deploy/content.sha256)'"

      - name: Smoke test public pages
        timeout-minutes: 4
        run: |
          retry_curl() {
            local label="$1"
            shift
            local attempt
            for attempt in 1 2 3 4 5; do
              if curl -fsS --max-time 10 "$@" >/dev/null; then
                return 0
              fi
              if [ "$attempt" -lt 5 ]; then
                echo "Retry ${attempt}/5 failed for ${label}; waiting before next attempt..."
                sleep $((attempt * 2))
              fi
            done
            echo "Smoke check failed: ${label}"
            return 1
          }

          pages=(
            "/"
            "/uslugi.html"
            "/contact.html"
            "/about.html"
            "/bytovaya-index.html"
            "/bytovaya-uslugi.html"
            "/holodilnoe-oborudovanie.html"
            "/data/runtime-config.json"
            "/version.json"
          )
          for page in "${pages[@]}"; do
            retry_curl "HEAD https://mospochin.ru${page}" -I "https://mospochin.ru${page}"
          done
          endpoint="$(node -e "const fs=require('fs');const cfg=JSON.parse(fs.readFileSync('data/runtime-config.json','utf8'));if(!cfg.telegramFormEndpoint)process.exit(1);process.stdout.write(cfg.telegramFormEndpoint)")"
          retry_curl "POST https://mospochin.ru${endpoint}" -X POST \
            -H 'Content-Type: application/json' \
            -d '{"name":"GitHub Actions Smoke","phone":"+79991234567","type":"Deploy smoke test","problem":"Автоматическая проверка после выкладки","page":"uslugi.html","branch":"restaurant","formContext":"github-actions-deploy","extraFields":{},"website":"","consent":true}' \
            "https://mospochin.ru${endpoint}"
          mapfile -t smoke_assets < <(grep -E '^(assets/.*|styles.*\.css|main\.js|telegram-form\.js)$' .deploy/include-files.txt | head -20)
          for asset in "${smoke_assets[@]}"; do
            retry_curl "HEAD https://mospochin.ru/${asset}" -I "https://mospochin.ru/${asset}"
          done

      - name: Verify backend deploy artifacts are present in manifest
        run: |
          required=(
            "server/telegram-api.mjs"
            "deploy/post-activate.sh"
            "deploy/systemd/mospochin-telegram-api.service"
            "deploy/env/telegram.env.example"
          )
          for path in "${required[@]}"; do
            grep -Fx "$path" .deploy/include-files.txt >/dev/null
          done

      - name: Write deploy summary
        if: always()
        run: |
          {
            echo "## Mospochin deploy"
            echo
            echo "| Field | Value |"
            echo "| --- | --- |"
            echo "| Commit | \`${GITHUB_SHA}\` |"
            echo "| Run | \`${GITHUB_RUN_ID}\` / \`${GITHUB_RUN_NUMBER}\` |"
            echo "| Deploy skipped | \`${{ steps.deploy_hash.outputs.skip || 'unknown' }}\` |"
            echo "| Local content hash | \`${{ steps.deploy_hash.outputs.local_hash || 'unknown' }}\` |"
            echo "| Remote content hash | \`${{ steps.deploy_hash.outputs.remote_hash || 'unknown' }}\` |"
            echo "| Manifest files | \`$(wc -l < .deploy/include-files.txt)\` |"
            echo "| Manifest assets | \`$(grep -c '^assets/' .deploy/include-files.txt || true)\` |"
          } >> "$GITHUB_STEP_SUMMARY"
