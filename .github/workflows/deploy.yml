name: Deploy to VPS

on:
  workflow_dispatch:

concurrency:
  group: vps-deploy
  cancel-in-progress: false

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Calculate deploy content hash
        run: node tools/hash-deploy-content.mjs

      - name: Setup SSH
        run: |
          set -euo pipefail

          mkdir -p ~/.ssh
          chmod 700 ~/.ssh

          printf '%s\n' "${{ secrets.DEPLOY_SSH_KEY }}" \
            > ~/.ssh/deploy_key

          chmod 600 ~/.ssh/deploy_key

          ssh-keyscan \
            -p "${{ secrets.DEPLOY_PORT }}" \
            "${{ secrets.DEPLOY_HOST }}" \
            >> ~/.ssh/known_hosts

      - name: Deploy on VPS
        timeout-minutes: 8
        run: |
          set -euo pipefail

          CONTENT_HASH="$(cat .deploy/content.sha256)"

          echo "Commit: ${GITHUB_SHA}"
          echo "Run: ${GITHUB_RUN_ID}"
          echo "Content hash: ${CONTENT_HASH}"

          ssh \
            -i ~/.ssh/deploy_key \
            -p "${{ secrets.DEPLOY_PORT }}" \
            -o IdentitiesOnly=yes \
            -o BatchMode=yes \
            -o StrictHostKeyChecking=yes \
            -o ConnectTimeout=15 \
            "${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }}" \
            "sudo -n /usr/local/sbin/mospochin-deploy-git \
              '${GITHUB_SHA}' \
              '${GITHUB_RUN_ID}' \
              '${GITHUB_RUN_NUMBER}' \
              '${CONTENT_HASH}'"

      - name: Verify production commit
        timeout-minutes: 3
        run: |
          set -euo pipefail

          VERSION=""

          for attempt in $(seq 1 30); do
            VERSION="$(
              curl \
                -fsS \
                --connect-timeout 5 \
                --max-time 15 \
                -H 'Cache-Control: no-cache' \
                "https://mospochin.ru/version.json?run=${GITHUB_RUN_ID}" \
              || true
            )"

            if printf '%s' "$VERSION" | grep -Fq "$GITHUB_SHA"; then
              echo "Production commit activated:"
              printf '%s\n' "$VERSION"
              exit 0
            fi

            echo "Ожидаем активацию production: $attempt/30"
            sleep 4
          done

          echo "ОШИБКА: production остался на другом commit"
          printf '%s\n' "$VERSION"
          exit 1

      - name: Verify Sous-Vide pages
        timeout-minutes: 3
        run: |
          set -euo pipefail

          pages=(
            "/"
            "/sous-vide-restoranov.html"
            "/remont-sous-vide.html"
            "/remont-termostata-sous-vide.html"
            "/remont-termostata-sous-vide-reklama.html"
            "/remont-vakuumnogo-upakovshika.html"
          )

          for page in "${pages[@]}"; do
            echo "GET $page"

            curl \
              -fsS \
              --retry 5 \
              --retry-delay 3 \
              --connect-timeout 5 \
              --max-time 20 \
              "https://mospochin.ru${page}?run=${GITHUB_RUN_ID}" \
              >/dev/null
          done

      - name: Write summary
        if: always()
        run: |
          {
            echo "## MosPochin deploy"
            echo
            echo "- Commit: \`${GITHUB_SHA}\`"
            echo "- Run: \`${GITHUB_RUN_ID}\`"
            echo "- Deployment command: \`mospochin-deploy-git\`"
            echo "- Arbitrary sudo commands: disabled"
          } >> "$GITHUB_STEP_SUMMARY"
