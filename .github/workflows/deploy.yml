name: Deploy to VPS

on:
  push:
    branches: [main]
    paths:
      - "**/*.html"
      - "assets/**"
      - "data/**"
      - "tools/**"
      - "main.js"
      - "telegram-form.js"
      - "styles.css"
      - "sitemap.xml"
      - "package.json"
      - "package-lock.json"
      - ".github/workflows/deploy.yml"
  workflow_dispatch:

concurrency:
  group: vps-deploy
  cancel-in-progress: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Validate site
        run: npm run lint

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          printf '%s\n' "${{ secrets.DEPLOY_SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -p "${{ secrets.DEPLOY_PORT }}" "${{ secrets.DEPLOY_HOST }}" >> ~/.ssh/known_hosts

      - name: Prepare release
        run: |
          release_name="${GITHUB_SHA}-${GITHUB_RUN_ID}"
          release_path="${{ secrets.DEPLOY_PATH }}/${release_name}"
          mkdir -p .deploy
          printf '%s\n' "${release_path}" > .deploy/release_path
          cat > version.json <<JSON
          {
            "commit": "${GITHUB_SHA}",
            "run_id": "${GITHUB_RUN_ID}",
            "run_number": "${GITHUB_RUN_NUMBER}",
            "deployed_at": "$(date -u +'%Y-%m-%dT%H:%M:%SZ')"
          }
          JSON
          node tools/generate-deploy-manifest.mjs --allow-generated-version
          rm -rf .deploy/package
          mkdir -p .deploy/package
          rsync -a --files-from=.deploy/include-files.txt ./ .deploy/package/
          ssh -i ~/.ssh/deploy_key -p "${{ secrets.DEPLOY_PORT }}" -o IdentitiesOnly=yes -o BatchMode=yes -o StrictHostKeyChecking=yes -o ConnectTimeout=15 \
            "${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }}" \
            "rm -rf '${release_path}' && mkdir -p '${release_path}'"

      - name: Deploy files
        timeout-minutes: 15
        run: |
          release_path="$(cat .deploy/release_path)"
          rsync -a --delete --info=stats2,progress2 \
            -e "ssh -i ~/.ssh/deploy_key -p ${{ secrets.DEPLOY_PORT }} -o IdentitiesOnly=yes -o BatchMode=yes -o StrictHostKeyChecking=yes -o ConnectTimeout=15 -o ServerAliveInterval=15 -o ServerAliveCountMax=2" \
            .deploy/package/ "${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }}:${release_path}/"

      - name: Activate release
        timeout-minutes: 2
        run: |
          release_path="$(cat .deploy/release_path)"
          ssh -i ~/.ssh/deploy_key -p "${{ secrets.DEPLOY_PORT }}" -o IdentitiesOnly=yes -o BatchMode=yes -o StrictHostKeyChecking=yes -o ConnectTimeout=15 \
            "${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }}" \
            "sudo /usr/local/sbin/mospochin-activate-release '${release_path}' && sudo /usr/local/sbin/mospochin-prune-releases 5"

      - name: Smoke test public pages
        timeout-minutes: 2
        run: |
          pages=(
            "/"
            "/uslugi.html"
            "/contact.html"
            "/about.html"
            "/bytovaya-index.html"
            "/bytovaya-uslugi.html"
            "/holodilnoe-oborudovanie.html"
            "/version.json"
          )
          for page in "${pages[@]}"; do
            curl -fsSI --max-time 10 "https://mospochin.ru${page}" >/dev/null
          done
