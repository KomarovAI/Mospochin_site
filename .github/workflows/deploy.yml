name: Deploy to VPS

on:
  workflow_dispatch:

concurrency:
  group: vps-deploy
  cancel-in-progress: false

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Calculate deploy content hash
        run: node tools/hash-deploy-content.mjs

      - name: Setup SSH
        run: |
          set -euo pipefail
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          printf '%s\n' "${{ secrets.DEPLOY_SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan \
            -p "${{ secrets.DEPLOY_PORT }}" \
            "${{ secrets.DEPLOY_HOST }}" \
            >> ~/.ssh/known_hosts

      - name: Check deployed content hash
        id: deploy_hash
        run: |
          set -euo pipefail

          local_hash="$(cat .deploy/content.sha256)"

          remote_hash="$(
            ssh \
              -i ~/.ssh/deploy_key \
              -p "${{ secrets.DEPLOY_PORT }}" \
              -o IdentitiesOnly=yes \
              -o BatchMode=yes \
              -o StrictHostKeyChecking=yes \
              -o ConnectTimeout=15 \
              "${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }}" \
              "cat /var/www/mospochin-shared/current-content.sha256 2>/dev/null || true"
          )"

          echo "local_hash=$local_hash" >> "$GITHUB_OUTPUT"
          echo "remote_hash=${remote_hash:-none}" >> "$GITHUB_OUTPUT"

          if [[ "$local_hash" == "$remote_hash" ]]; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
            echo "Production content is already identical."
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
            echo "Content changed. Deploy required."
          fi

      - name: Deploy on VPS
        if: steps.deploy_hash.outputs.skip != 'true'
        timeout-minutes: 5
        run: |
          set -euo pipefail

          ssh \
            -i ~/.ssh/deploy_key \
            -p "${{ secrets.DEPLOY_PORT }}" \
            -o IdentitiesOnly=yes \
            -o BatchMode=yes \
            -o StrictHostKeyChecking=yes \
            -o ConnectTimeout=15 \
            "${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }}" \
            "sudo /usr/local/sbin/mospochin-deploy-git \
              '${GITHUB_SHA}' \
              '${GITHUB_RUN_ID}' \
              '${GITHUB_RUN_NUMBER}' \
              '$(cat .deploy/content.sha256)'"

      - name: Write summary
        if: always()
        run: |
          {
            echo "## MosPochin production deploy"
            echo
            echo "- Commit: \`${GITHUB_SHA}\`"
            echo "- Run: \`${GITHUB_RUN_ID}\`"
            echo "- Content unchanged: \`${{ steps.deploy_hash.outputs.skip || 'unknown' }}\`"
            echo "- Local hash: \`${{ steps.deploy_hash.outputs.local_hash || 'unknown' }}\`"
            echo "- Remote hash: \`${{ steps.deploy_hash.outputs.remote_hash || 'unknown' }}\`"
          } >> "$GITHUB_STEP_SUMMARY"
