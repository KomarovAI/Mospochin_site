name: Deploy to VPS

on:
  push:
    branches: [main]
    paths:
      - "**/*.html"
      - "assets/**"
      - "data/**"
      - "deploy/**"
      - "server/**"
      - "tools/**"
      - "main.js"
      - "telegram-form.js"
      - "styles-combined.css"
      - "sitemap.xml"
      - "package.json"
      - "package-lock.json"
      - ".github/workflows/deploy.yml"
  workflow_dispatch:

concurrency:
  group: vps-deploy
  cancel-in-progress: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Install dependencies
        run: npm ci

      - name: Validate site
        run: |
          npm run check:core
          npm run check:ai || echo "::warning::AI/generated checks failed; deploy continues. Fix generated AI artifacts separately."

      - name: Calculate deploy content hash
        run: npm run hash:deploy-content

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          printf '%s\n' "${{ secrets.DEPLOY_SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -p "${{ secrets.DEPLOY_PORT }}" "${{ secrets.DEPLOY_HOST }}" >> ~/.ssh/known_hosts

      - name: Check deployed content hash
        id: deploy_hash
        run: |
          local_hash="$(cat .deploy/content.sha256)"
          remote_hash="$(ssh -i ~/.ssh/deploy_key -p "${{ secrets.DEPLOY_PORT }}" -o IdentitiesOnly=yes -o BatchMode=yes -o StrictHostKeyChecking=yes -o ConnectTimeout=15 \
            "${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }}" \
            "cat /var/www/mospochin-shared/current-content.sha256 2>/dev/null || true")"
          if [ "$local_hash" = "$remote_hash" ]; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
            echo "local_hash=${local_hash}" >> "$GITHUB_OUTPUT"
            echo "remote_hash=${remote_hash}" >> "$GITHUB_OUTPUT"
            echo "Deploy skipped: published content hash is unchanged."
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
            echo "local_hash=${local_hash}" >> "$GITHUB_OUTPUT"
            echo "remote_hash=${remote_hash:-none}" >> "$GITHUB_OUTPUT"
            echo "Deploy required: content hash changed."
          fi

      - name: Deploy on VPS
        if: steps.deploy_hash.outputs.skip != 'true'
        timeout-minutes: 2
        run: |
          ssh -i ~/.ssh/deploy_key -p "${{ secrets.DEPLOY_PORT }}" -o IdentitiesOnly=yes -o BatchMode=yes -o StrictHostKeyChecking=yes -o ConnectTimeout=15 \
            "${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }}" \
            "sudo /usr/local/sbin/mospochin-deploy-git '${GITHUB_SHA}' '${GITHUB_RUN_ID}' '${GITHUB_RUN_NUMBER}' '$(cat .deploy/content.sha256)'"

      - name: Smoke test public pages
        timeout-minutes: 4
        run: |
          retry_curl() {
            local label="$1"
            shift
            local attempt
            for attempt in 1 2 3 4 5; do
              if curl -fsS --max-time 10 "$@" >/dev/null; then
                return 0
              fi
              if [ "$attempt" -lt 5 ]; then
                echo "Retry ${attempt}/5 failed for ${label}; waiting before next attempt..."
                sleep $((attempt * 2))
              fi
            done
            echo "Smoke check failed: ${label}"
            return 1
          }

          pages=(
            "/"
            "/uslugi.html"
            "/contact.html"
            "/about.html"
            "/bytovaya-index.html"
            "/bytovaya-uslugi.html"
            "/holodilnoe-oborudovanie.html"
            "/data/runtime-config.json"
            "/version.json"
          )
          for page in "${pages[@]}"; do
            retry_curl "HEAD https://mospochin.ru${page}" -I "https://mospochin.ru${page}"
          done
          endpoint="$(node -e "const fs=require('fs');const cfg=JSON.parse(fs.readFileSync('data/runtime-config.json','utf8'));if(!cfg.telegramFormEndpoint)process.exit(1);process.stdout.write(cfg.telegramFormEndpoint)")"
          retry_curl "POST https://mospochin.ru${endpoint}" -X POST \
            -H 'Content-Type: application/json' \
            -d '{"name":"GitHub Actions Smoke","phone":"+79991234567","type":"Deploy smoke test","problem":"Автоматическая проверка после выкладки","page":"uslugi.html","branch":"restaurant","formContext":"github-actions-deploy","extraFields":{},"website":"","consent":true}' \
            "https://mospochin.ru${endpoint}"
          mapfile -t smoke_assets < <(grep -E '^(assets/.*|styles.*\.css|main\.js|telegram-form\.js)$' .deploy/include-files.txt | head -20)
          for asset in "${smoke_assets[@]}"; do
            retry_curl "HEAD https://mospochin.ru/${asset}" -I "https://mospochin.ru/${asset}"
          done

      - name: Verify cache and compression contract
        timeout-minutes: 2
        run: |
          set -euo pipefail

          require_header() {
            local headers="$1"
            local pattern="$2"
            local label="$3"
            if ! printf '%s\n' "$headers" | grep -Eiq "$pattern"; then
              echo "Missing expected header pattern for ${label}: ${pattern}"
              echo "Headers were:"
              printf '%s\n' "$headers"
              return 1
            fi
          }

          check_html_contract() {
            local path="$1"
            local headers
            headers="$(curl -fsS -I "https://mospochin.ru${path}")"
            require_header "$headers" '^cache-control:.*no-cache' "${path} html no-cache"
            require_header "$headers" '^cache-control:.*no-store' "${path} html no-store"
            require_header "$headers" '^vary:.*accept-encoding' "${path} html vary"
          }

          check_asset_contract() {
            local path="$1"
            local expect_encoding="$2"
            local headers
            headers="$(curl -fsS -I --compressed "https://mospochin.ru${path}")"
            require_header "$headers" '^cache-control:.*max-age=' "${path} asset max-age"
            require_header "$headers" '^cache-control:.*immutable' "${path} asset immutable"
            if [ "$expect_encoding" = "compressed" ]; then
              require_header "$headers" '^vary:.*accept-encoding' "${path} asset vary"
              require_header "$headers" '^content-encoding:\s*(gzip|br)' "${path} static compression"
            fi
          }

          check_image_fallback_contract() {
            local path="$1"
            local headers
            headers="$(curl -fsS -I -H 'Accept: image/jpeg,image/*,*/*;q=0.8' "https://mospochin.ru${path}")"
            require_header "$headers" '^content-type:\s*image/jpeg' "${path} jpeg fallback content-type"
            require_header "$headers" '^cache-control:.*immutable' "${path} jpeg fallback immutable"
            require_header "$headers" '^vary:.*accept' "${path} jpeg fallback vary"
          }

          check_webp_contract() {
            local path="$1"
            local headers
            headers="$(curl -fsS -I -H 'Accept: image/webp,image/*,*/*;q=0.8' "https://mospochin.ru${path}")"
            require_header "$headers" '^content-type:\s*image/webp' "${path} webp content-type"
            require_header "$headers" '^cache-control:.*immutable' "${path} webp immutable"
            require_header "$headers" '^vary:.*accept' "${path} webp vary"
          }


          check_security_headers() {
            local path="$1"
            local headers
            headers="$(curl -fsS -I "https://mospochin.ru${path}")"
            require_header "$headers" '^content-security-policy-report-only:.*frame-ancestors' "${path} csp report-only frame-ancestors"
            require_header "$headers" '^strict-transport-security:\s*max-age=31536000' "${path} hsts"
            require_header "$headers" '^referrer-policy:\s*strict-origin-when-cross-origin' "${path} referrer policy"
            require_header "$headers" '^permissions-policy:.*geolocation=\(\)' "${path} permissions policy"
          }

          check_manifest_webp_assets() {
            local sidecar
            local headers
            while IFS= read -r sidecar; do
              headers="$(curl -fsS -I "https://mospochin.ru/${sidecar}")"
              require_header "$headers" '^content-type:\s*image/webp' "${sidecar} direct webp content-type"
              require_header "$headers" '^cache-control:.*immutable' "${sidecar} direct webp immutable"
            done < <(grep -E '\.(jpg|jpeg|png)\.webp$' .deploy/include-files.txt)
          }

          check_html_contract "/"
          check_security_headers "/"
          check_html_contract "/uslugi.html"
          check_asset_contract "/styles-combined.css" "compressed"
          check_asset_contract "/main.js" "compressed"
          check_asset_contract "/assets/images/hero-restaurant.jpg" "none"
          check_image_fallback_contract "/assets/images/hero-restaurant.jpg"
          check_manifest_webp_assets

      - name: Verify static compression sidecars
        timeout-minutes: 2
        run: |
          ssh -i ~/.ssh/deploy_key -p "${{ secrets.DEPLOY_PORT }}" -o IdentitiesOnly=yes -o BatchMode=yes -o StrictHostKeyChecking=yes -o ConnectTimeout=15 \
            "${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }}" \
            "set -e; \
             if [ '${{ steps.deploy_hash.outputs.skip }}' = 'true' ] && [ ! -s /var/www/mospochin-public-current/styles-combined.css.gz ]; then \
               echo 'Static gzip sidecars are not present on a skipped deploy; skipping first-activation check.'; \
               exit 0; \
             fi; \
             test -s /var/www/mospochin-public-current/styles-combined.css.gz; \
             test -s /var/www/mospochin-public-current/main.js.gz; \
             gzip -cd /var/www/mospochin-public-current/styles-combined.css.gz | cmp -s - /var/www/mospochin-public-current/styles-combined.css; \
             gzip -cd /var/www/mospochin-public-current/main.js.gz | cmp -s - /var/www/mospochin-public-current/main.js; \
             if command -v brotli >/dev/null 2>&1 && [ -s /var/www/mospochin-public-current/styles-combined.css.br ]; then \
               brotli -cd /var/www/mospochin-public-current/styles-combined.css.br | cmp -s - /var/www/mospochin-public-current/styles-combined.css; \
             fi; \
             grep -Eq '^[[:space:]]*gzip_static[[:space:]]+on;' /etc/nginx/conf.d/mospochin-static-compression.conf"

      - name: Verify backend deploy artifacts are present in manifest
        run: |
          required=(
            "server/telegram-api.mjs"
            "deploy/post-activate.sh"
            "tools/generate-public-file-list.mjs"
            "deploy/systemd/mospochin-telegram-api.service"
            "deploy/env/telegram.env.example"
          )
          for path in "${required[@]}"; do
            grep -Fx "$path" .deploy/include-files.txt >/dev/null
          done

      - name: Write deploy summary
        if: always()
        run: |
          {
            echo "## Mospochin deploy"
            echo
            echo "| Field | Value |"
            echo "| --- | --- |"
            echo "| Commit | \`${GITHUB_SHA}\` |"
            echo "| Run | \`${GITHUB_RUN_ID}\` / \`${GITHUB_RUN_NUMBER}\` |"
            echo "| Deploy skipped | \`${{ steps.deploy_hash.outputs.skip || 'unknown' }}\` |"
            echo "| Local content hash | \`${{ steps.deploy_hash.outputs.local_hash || 'unknown' }}\` |"
            echo "| Remote content hash | \`${{ steps.deploy_hash.outputs.remote_hash || 'unknown' }}\` |"
            echo "| Manifest files | \`$(wc -l < .deploy/include-files.txt)\` |"
            echo "| Manifest assets | \`$(grep -c '^assets/' .deploy/include-files.txt || true)\` |"
          } >> "$GITHUB_STEP_SUMMARY"
