name: Deploy to VPS

on:
  push:
    branches: [main]
    paths:
      - "**/*.html"
      - "assets/**"
      - "data/**"
      - "tools/**"
      - "main.js"
      - "telegram-form.js"
      - "styles.css"
      - "sitemap.xml"
      - "package.json"
      - "package-lock.json"
      - ".github/workflows/deploy.yml"
  workflow_dispatch:

concurrency:
  group: vps-deploy
  cancel-in-progress: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Validate site
        run: npm run lint

      - name: Calculate deploy content hash
        run: npm run hash:deploy-content

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          printf '%s\n' "${{ secrets.DEPLOY_SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -p "${{ secrets.DEPLOY_PORT }}" "${{ secrets.DEPLOY_HOST }}" >> ~/.ssh/known_hosts

      - name: Check deployed content hash
        id: deploy_hash
        run: |
          local_hash="$(cat .deploy/content.sha256)"
          remote_hash="$(ssh -i ~/.ssh/deploy_key -p "${{ secrets.DEPLOY_PORT }}" -o IdentitiesOnly=yes -o BatchMode=yes -o StrictHostKeyChecking=yes -o ConnectTimeout=15 \
            "${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }}" \
            "cat /var/www/mospochin-shared/current-content.sha256 2>/dev/null || true")"
          if [ "$local_hash" = "$remote_hash" ]; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
            echo "Deploy skipped: published content hash is unchanged."
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
            echo "Deploy required: content hash changed."
          fi

      - name: Deploy on VPS
        if: steps.deploy_hash.outputs.skip != 'true'
        timeout-minutes: 2
        run: |
          ssh -i ~/.ssh/deploy_key -p "${{ secrets.DEPLOY_PORT }}" -o IdentitiesOnly=yes -o BatchMode=yes -o StrictHostKeyChecking=yes -o ConnectTimeout=15 \
            "${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }}" \
            "sudo /usr/local/sbin/mospochin-deploy-git '${GITHUB_SHA}' '${GITHUB_RUN_ID}' '${GITHUB_RUN_NUMBER}' '$(cat .deploy/content.sha256)'"

      - name: Smoke test public pages
        timeout-minutes: 2
        run: |
          pages=(
            "/"
            "/uslugi.html"
            "/contact.html"
            "/about.html"
            "/bytovaya-index.html"
            "/bytovaya-uslugi.html"
            "/holodilnoe-oborudovanie.html"
            "/version.json"
          )
          for page in "${pages[@]}"; do
            curl -fsSI --max-time 10 "https://mospochin.ru${page}" >/dev/null
          done
          grep -E '^(assets/.*|styles.*\.css|main\.js|telegram-form\.js)$' .deploy/include-files.txt | head -20 | while IFS= read -r asset; do
            curl -fsSI --max-time 10 "https://mospochin.ru/${asset}" >/dev/null
          done
