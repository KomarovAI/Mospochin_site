name: Emergency root Nginx repair and exact deploy

on:
  workflow_dispatch:

concurrency:
  group: vps-deploy
  cancel-in-progress: false

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  EXPECTED_ROOT_HOST_FINGERPRINT: SHA256:KPrRV/aAwJgBMGGo116pUeK+5Dr0V1HIy6wYy9Hmq+E

jobs:
  repair-and-deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Calculate deploy content hash
        shell: bash
        run: |
          set -euo pipefail
          node tools/hash-deploy-content.mjs

      - name: Setup and verify SSH identities
        shell: bash
        run: |
          set -euo pipefail

          mkdir -p ~/.ssh
          chmod 700 ~/.ssh

          printf '%s\n' "${{ secrets.MOSPOCHIN_ONE_TIME_ROOT_SSH_KEY }}" \
            > ~/.ssh/root_recovery_key
          chmod 600 ~/.ssh/root_recovery_key

          printf '%s\n' "${{ secrets.DEPLOY_SSH_KEY }}" \
            > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key

          ROOT_PUBLIC="$(
            ssh-keygen -y -f ~/.ssh/root_recovery_key
          )"

          [[ -n "$ROOT_PUBLIC" ]] || {
            echo "ERROR: temporary root key is invalid" >&2
            exit 31
          }

          ssh-keyscan \
            -p "${{ secrets.DEPLOY_PORT }}" \
            "${{ secrets.DEPLOY_HOST }}" \
            > ~/.ssh/known_hosts.scan 2>/dev/null

          [[ -s ~/.ssh/known_hosts.scan ]] || {
            echo "ERROR: ssh-keyscan returned no host keys" >&2
            exit 32
          }

          MATCHED=0

          while IFS= read -r LINE; do
            printf '%s\n' "$LINE" > /tmp/one-host-key

            FINGERPRINT="$(
              ssh-keygen -lf /tmp/one-host-key -E sha256 |
                awk '{print $2}'
            )"

            echo "SCANNED_HOST_FINGERPRINT=$FINGERPRINT"

            if [[ "$FINGERPRINT" == "$EXPECTED_ROOT_HOST_FINGERPRINT" ]]; then
              MATCHED=1
              printf '%s\n' "$LINE" >> ~/.ssh/known_hosts
            fi
          done < ~/.ssh/known_hosts.scan

          [[ "$MATCHED" == "1" ]] || {
            echo "ERROR: VPS host fingerprint mismatch" >&2
            exit 33
          }

          chmod 600 ~/.ssh/known_hosts
          echo "ROOT_KEY_VALIDATION=PASS"
          echo "HOST_FINGERPRINT_VALIDATION=PASS"

      - name: Build exact bounded repair payload
        shell: bash
        run: |
          set -euo pipefail

          cat > /tmp/mospochin-root-nginx-repair.sh <<'ROOT_REPAIR'
          #!/usr/bin/env bash
          set -Eeuo pipefail

          SITE="/etc/nginx/sites-available/mospochin.conf"
          ENABLED="/etc/nginx/sites-enabled/mospochin.conf"
          STAMP="$(date +%Y%m%d-%H%M%S)"
          BACKUP_DIR="/root/mospochin-nginx-recovery-${STAMP}"

          echo "RECOVERY_CHANNEL=GITHUB_ACTIONS_TEMPORARY_ROOT_SECRET"
          echo "RECOVERY_HOST=$(hostname)"
          echo "RECOVERY_USER=$(id -un)"
          echo "BACKUP_DIR=$BACKUP_DIR"

          [[ "$(id -u)" == "0" ]] || {
            echo "ERROR: root recovery payload is not running as root" >&2
            exit 41
          }

          [[ -f "$SITE" ]] || {
            echo "ERROR: site config not found: $SITE" >&2
            exit 42
          }

          set +e
          BEFORE="$(nginx -t 2>&1)"
          BEFORE_RC=$?
          set -e

          printf '%s\n' "$BEFORE"

          if (( BEFORE_RC == 0 )); then
            echo "NGINX_PRECHECK=ALREADY_VALID"
            exit 0
          fi

          printf '%s' "$BEFORE" |
            grep -Fq 'location "/package.json" is outside location' || {
              echo "ERROR: refusing repair for unknown Nginx failure" >&2
              exit 43
            }

          printf '%s' "$BEFORE" |
            grep -Fq 'mospochin-runtime-hardening.conf' || {
              echo "ERROR: failure does not reference managed runtime-hardening snippet" >&2
              exit 44
            }

          mkdir -p "$BACKUP_DIR"
          chmod 700 "$BACKUP_DIR"

          cp -a "$SITE" "$BACKUP_DIR/mospochin.conf.before"

          TARGETS=("$SITE")

          if [[ -f "$ENABLED" && ! -L "$ENABLED" ]]; then
            SITE_REAL="$(readlink -f "$SITE")"
            ENABLED_REAL="$(readlink -f "$ENABLED")"

            if [[ "$SITE_REAL" != "$ENABLED_REAL" ]]; then
              cp -a "$ENABLED" "$BACKUP_DIR/mospochin-enabled.conf.before"
              TARGETS+=("$ENABLED")
            fi
          fi

          python3 - "${TARGETS[@]}" <<'PY_REPAIR'
          from pathlib import Path
          import re
          import sys

          pattern = re.compile(
              r"(?m)^[ \t]*include[ \t]+"
              r"(?:/etc/nginx/)?snippets/"
              r"mospochin-runtime-hardening\.conf;"
              r"[ \t]*(?:\n|$)"
          )

          total = 0

          for raw_path in sys.argv[1:]:
              path = Path(raw_path)
              original = path.read_text(encoding="utf-8")
              repaired, count = pattern.subn("", original)

              if count:
                  temporary = path.with_name(
                      path.name + ".github-root-recovery.tmp"
                  )
                  temporary.write_text(
                      repaired.rstrip() + "\n",
                      encoding="utf-8",
                  )
                  temporary.chmod(path.stat().st_mode)
                  temporary.replace(path)

              total += count
              print(f"REPAIRED_FILE={path} REMOVED_INCLUDES={count}")

          if total < 1:
              raise SystemExit(
                  "known Nginx error detected, but no managed include line was removed"
              )

          print(f"REMOVED_RUNTIME_HARDENING_INCLUDES_TOTAL={total}")
          PY_REPAIR

          set +e
          AFTER="$(nginx -t 2>&1)"
          AFTER_RC=$?
          set -e

          printf '%s\n' "$AFTER"

          if (( AFTER_RC != 0 )); then
            echo "ERROR: Nginx remained invalid; restoring exact backups" >&2

            cp -a "$BACKUP_DIR/mospochin.conf.before" "$SITE"

            if [[ -f "$BACKUP_DIR/mospochin-enabled.conf.before" ]]; then
              cp -a \
                "$BACKUP_DIR/mospochin-enabled.conf.before" \
                "$ENABLED"
            fi

            nginx -t 2>&1 || true
            exit 45
          fi

          sha256sum "$SITE" > "$BACKUP_DIR/after.sha256"

          echo "NGINX_REPAIR_TEST=PASS"
          echo "NGINX_RELOAD_PERFORMED=NO"
          echo "NEXT_STAGE=STANDARD_MOSPOCHIN_DEPLOY_GIT"
          ROOT_REPAIR

          chmod 700 /tmp/mospochin-root-nginx-repair.sh
          bash -n /tmp/mospochin-root-nginx-repair.sh

          echo "ROOT_REPAIR_PAYLOAD_BASH_N=PASS"

      - name: Repair stale Nginx config as one-time root
        shell: bash
        timeout-minutes: 5
        run: |
          set -euo pipefail

          ssh \
            -i ~/.ssh/root_recovery_key \
            -p "${{ secrets.DEPLOY_PORT }}" \
            -o IdentitiesOnly=yes \
            -o BatchMode=yes \
            -o StrictHostKeyChecking=yes \
            -o ConnectTimeout=15 \
            -o ServerAliveInterval=15 \
            -o ServerAliveCountMax=3 \
            "root@${{ secrets.DEPLOY_HOST }}" \
            'bash -s' \
            < /tmp/mospochin-root-nginx-repair.sh

      - name: Deploy current exact SHA through standard deploy identity
        shell: bash
        timeout-minutes: 12
        run: |
          set -euo pipefail

          CONTENT_HASH="$(cat .deploy/content.sha256)"

          echo "Commit: ${GITHUB_SHA}"
          echo "Run: ${GITHUB_RUN_ID}"
          echo "Content hash: ${CONTENT_HASH}"

          ssh \
            -i ~/.ssh/deploy_key \
            -p "${{ secrets.DEPLOY_PORT }}" \
            -o IdentitiesOnly=yes \
            -o BatchMode=yes \
            -o StrictHostKeyChecking=yes \
            -o ConnectTimeout=15 \
            -o ServerAliveInterval=15 \
            -o ServerAliveCountMax=3 \
            "${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }}" \
            "sudo -n /usr/local/sbin/mospochin-deploy-git \
              '${GITHUB_SHA}' \
              '${GITHUB_RUN_ID}' \
              '${GITHUB_RUN_NUMBER}' \
              '${CONTENT_HASH}'"

      - name: Verify production exact SHA
        shell: bash
        timeout-minutes: 7
        run: |
          set -euo pipefail

          VERSION=""

          for attempt in $(seq 1 60); do
            VERSION="$(
              curl \
                -fsS \
                --retry 5 \
                --retry-delay 3 \
                --retry-all-errors \
                --connect-timeout 8 \
                --max-time 25 \
                -H 'Cache-Control: no-cache' \
                "https://mospochin.ru/version.json?run=${GITHUB_RUN_ID}&attempt=${attempt}" \
              || true
            )"

            COMMIT="$(
              printf '%s' "$VERSION" |
                jq -r '.commit // empty' 2>/dev/null ||
                true
            )"

            RUN_ID="$(
              printf '%s' "$VERSION" |
                jq -r '.run_id // empty' 2>/dev/null ||
                true
            )"

            echo "VERSION_ATTEMPT=$attempt COMMIT=$COMMIT RUN_ID=$RUN_ID"

            if [[ "$COMMIT" == "$GITHUB_SHA" &&
                  "$RUN_ID" == "$GITHUB_RUN_ID" ]]; then
              printf '%s\n' "$VERSION" | jq .
              exit 0
            fi

            sleep 5
          done

          echo "ERROR: production did not confirm exact SHA/run" >&2
          printf '%s\n' "$VERSION" >&2
          exit 1

      - name: Verify ventilation redirects
        shell: bash
        timeout-minutes: 5
        run: |
          set -euo pipefail

          BASE_URL="https://mospochin.ru"
          PASS=0

          while IFS='|' read -r SOURCE TARGET; do
            HEADERS="$(
              curl \
                -sS \
                --retry 8 \
                --retry-delay 3 \
                --retry-all-errors \
                --connect-timeout 8 \
                --max-time 25 \
                -D - \
                -o /dev/null \
                "${BASE_URL}${SOURCE}?run=${GITHUB_RUN_ID}"
            )"

            CODE="$(
              printf '%s\n' "$HEADERS" |
                awk '/^HTTP\// {value=$2} END {print value}'
            )"

            LOCATION="$(
              printf '%s\n' "$HEADERS" |
                awk '
                  BEGIN {IGNORECASE=1}
                  /^location:/ {
                    sub(/\r$/, "")
                    sub(/^[^:]+:[[:space:]]*/, "")
                    print
                    exit
                  }
                '
            )"

            LOCATION_PATH="$LOCATION"
            LOCATION_PATH="${LOCATION_PATH#${BASE_URL}}"
            LOCATION_PATH="${LOCATION_PATH%%\?*}"

            echo "HTTP=$CODE SOURCE=$SOURCE LOCATION=${LOCATION:-none} EXPECTED=$TARGET"

            [[ "$CODE" == "301" ]]
            [[ "$LOCATION_PATH" == "$TARGET" ]]

            PASS=$((PASS + 1))
          done <<'REDIRECTS'
          /chto-proveryaet-inzhener-ventilyatsii.html|/diagnostika-ventilyatsii-restorana.html
          /kak-podgotovitsya-k-vyezdu-mastera-po-ventilyatsii.html|/diagnostika-ventilyatsii-restorana.html
          /kak-ponyat-chto-nuzhna-chistka-ventilyatsii.html|/chistka-ventilyatsii-restoranov.html
          /kanalnaya-ventilyatsiya-restorana.html|/remont-vozduhovodov-restorana.html
          /oshibki-pri-ekspluatatsii-vytyazhki-restorana.html|/chek-list-ventilyatsii-restorana.html
          /pochemu-vytyazhka-ne-tyanet-v-restorane.html|/ventilyatsiya-restorana-ne-tyanet.html
          /ventilyatsiya-i-posudomoechnaya-zona.html|/ventilyatsiya-moechnoj-zony.html
          /ventilyatsiya-kafe.html|/ventilyatsiya-restoranov.html
          REDIRECTS

          echo "REDIRECTS=$PASS/8"
          [[ "$PASS" == "8" ]]

      - name: Verify ventilation assets
        shell: bash
        timeout-minutes: 5
        run: |
          set -euo pipefail

          for PATHNAME in \
            /ventilyatsiya-restoranov.html \
            /remont-ventilyatsii-restoranov.html \
            /ventilation-navigation.css \
            /ventilation-conversion.css \
            /ventilation-conversion.js \
            /ventilation-media.css \
            /data/ventilation-navigation.json \
            /data/ventilation-conversion-pages.json \
            /data/ventilation-media-map.json \
            /data/ventilation-redirects.json
          do
            META="$(
              curl \
                -sS \
                --retry 8 \
                --retry-delay 3 \
                --retry-all-errors \
                --connect-timeout 8 \
                --max-time 25 \
                -o /dev/null \
                -w '%{http_code}\t%{size_download}' \
                "https://mospochin.ru${PATHNAME}?run=${GITHUB_RUN_ID}"
            )"

            CODE="${META%%$'\t'*}"
            SIZE="${META#*$'\t'}"

            echo "HTTP=$CODE SIZE=$SIZE PATH=$PATHNAME"

            [[ "$CODE" == "200" ]]
            [[ "${SIZE%%.*}" -gt 0 ]]
          done

          echo "ASSETS=10/10"

      - name: Destroy runner copies of SSH keys
        if: always()
        shell: bash
        run: |
          rm -f \
            ~/.ssh/root_recovery_key \
            ~/.ssh/deploy_key \
            /tmp/mospochin-root-nginx-repair.sh \
            /tmp/one-host-key

      - name: Write summary
        if: always()
        shell: bash
        run: |
          {
            echo "## MosPochin one-time root recovery"
            echo
            echo "- Commit: \`${GITHUB_SHA}\`"
            echo "- Run: \`${GITHUB_RUN_ID}\`"
            echo "- Root key source: temporary encrypted Actions secret"
            echo "- Root repair scope: exact stale runtime-hardening include only"
            echo "- Intermediate Nginx reload: **no**"
            echo "- Deployment: standard \`mospochin-deploy-git\`"
            echo "- Local direct VPS access: **no**"
          } >> "$GITHUB_STEP_SUMMARY"
